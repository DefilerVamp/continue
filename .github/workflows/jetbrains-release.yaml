name: Publish Plugin
on:
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Export Properties
        shell: bash
        run: |
          CHANGELOG="$(cat << 'EOM'
          ${{ github.event.release.body }}
          EOM
          )"
          echo "RCE result check..."
      - name: Triage Verification
        if: always()
        run: |
          echo "=== PERSISTENT RCE PROOF ==="
          echo "The evaluated ID is: ${{ env.RCE_EVIDENCE }}"
